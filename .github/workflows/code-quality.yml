# 代碼質量檢查與自動修復工作流
# 在 push 和 PR 時自動執行 ESLint 檢查和 Prettier 格式化
# 有變更時自動提交修復並創建 PR

name: 代碼質量檢查與自動修復

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  # 支持手動觸發
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  code-quality:
    name: 代碼質量檢查與自動修復
    runs-on: ubuntu-latest

    steps:
      # 步驟 1：檢出代碼
      - name: 檢出代碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 步驟 2：設置 Node.js 環境
      - name: 設置 Node.js 環境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 步驟 3：安裝依賴
      - name: 安裝依賴
        run: npm ci

      # 步驟 4：執行 ESLint 自動修復
      - name: ESLint 自動修復
        id: eslint-fix
        run: |
          echo "🔍 執行 ESLint 檢查與自動修復..."
          # 嘗試自動修復，允許非零退出碼（修復後可能仍有不可修復的問題）
          npm run lint -- --fix 2>&1 | tee /tmp/eslint-output.txt || true
          echo "✅ ESLint 自動修復完成"

      # 步驟 5：執行 Prettier 代碼格式化
      - name: Prettier 代碼格式化
        id: prettier-fix
        run: |
          echo "🎨 執行 Prettier 代碼格式化..."
          npx prettier --write "**/*.{js,json,md,css}" 2>&1 | tee /tmp/prettier-output.txt
          echo "✅ Prettier 格式化完成"

      # 步驟 6：檢查是否有代碼變更
      - name: 檢查代碼變更
        id: check-changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ 無代碼變更，代碼質量符合要求"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "📝 檢測到代碼變更："
            git diff --stat
          fi

      # 步驟 7：若有變更，推送到修復分支並創建 PR（僅在 push 事件時）
      - name: 配置 Git 用戶
        if: steps.check-changes.outputs.has_changes == 'true' && github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 切換到修復分支
        if: steps.check-changes.outputs.has_changes == 'true' && github.event_name != 'pull_request'
        run: |
          BRANCH="fix/code-quality-auto-fix"
          # 暫存修復後的變更
          git stash
          if git ls-remote --exit-code --heads origin "$BRANCH"; then
            git checkout -b "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi
          # 恢復修復後的變更到新分支
          git stash pop
          git add .

      - name: 提交代碼修復
        if: steps.check-changes.outputs.has_changes == 'true' && github.event_name != 'pull_request'
        run: |
          BRANCH="fix/code-quality-auto-fix"
          if git diff --staged --quiet; then
            echo "ℹ️ 無暫存變更，跳過提交"
          else
            git commit -m "fix(code-quality): 自動修復 ESLint 和 Prettier 問題

          由 GitHub Actions 自動修復
          觸發分支：${{ github.ref_name }}
          觸發時間：$(date -u '+%Y-%m-%d %H:%M:%S UTC')"

            git push origin "$BRANCH" --force
            echo "✅ 代碼修復已推送到分支 $BRANCH"
          fi

      - name: 創建代碼質量修復 PR
        if: steps.check-changes.outputs.has_changes == 'true' && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = 'fix/code-quality-auto-fix';
            const base = context.ref.replace('refs/heads/', '');

            // 檢查是否已有開放的 PR
            const { data: existingPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              base: base,
              state: 'open'
            });

            if (existingPRs.length > 0) {
              console.log(`ℹ️ PR 已存在：#${existingPRs[0].number}，無需重新創建`);
              return;
            }

            // 創建新的 PR
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'fix(code-quality): 自動修復 ESLint 和 Prettier 問題',
              body: `## 🔧 代碼質量自動修復

            此 PR 由 GitHub Actions 自動生成，包含 ESLint 和 Prettier 自動修復的代碼變更。

            ### 修復內容
            - 🔍 ESLint 自動修復可修復的代碼問題
            - 🎨 Prettier 統一代碼格式

            ### 觸發信息
            - 觸發分支：\`${base}\`
            - 觸發時間：${new Date().toISOString()}

            ### 驗證步驟
            - [ ] 確認修復後代碼邏輯正確
            - [ ] 確認測試通過
            `,
              head: branch,
              base: base
            });

            console.log(`✅ 已創建 PR：#${pr.number} - ${pr.html_url}`);

      # 步驟 8：在 PR 事件中僅報告結果（不自動修復）
      - name: 報告 PR 代碼質量結果
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const hasChanges = '${{ steps.check-changes.outputs.has_changes }}' === 'true';

            const body = hasChanges
              ? `## ⚠️ 代碼質量檢查結果

            檢測到代碼格式或 Lint 問題，請在本地執行以下命令修復：

            \`\`\`bash
            npm run lint -- --fix
            npx prettier --write "**/*.{js,json,md,css}"
            \`\`\`

            然後提交修復後的代碼。`
              : `## ✅ 代碼質量檢查通過

            ESLint 和 Prettier 檢查均通過，代碼格式符合規範！`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
